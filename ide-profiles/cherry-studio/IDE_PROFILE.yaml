  project_rules: unsupported
  mcp_config: manual_import
installation_mode: generated_prompt
backup_required: true
validation_required: true
restart_required: true
last_validation_date: '2026-07-20'
mcp_template_source: renderers/gateway-clients/cherry-studio.json
m8_enrollment: configured_restart_required
known_limitations:
- Cherry persists MCP servers in Local Storage LevelDB under redux key persist:cherry-studio;
  no simple file edit.
- Cherry does not expand ${env:} in headers; bearer must be materialized into the
  live store by the enrollment script.
- Cherry Global Memory must be OFF; builtin @cherry/* inMemory MCP servers must remain
  inactive.
- Rules are delivered through the AgentCore Workspace Agent system prompt, not a file-based
  global rule.
semantic_parity_gaps:
- Rule delivery depends on the operator/agent running scripts/cherry/configure_agentcore_agent.py
  to import the canonical AgentCore Workspace Agent prompt.
