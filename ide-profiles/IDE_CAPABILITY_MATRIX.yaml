    mcp_transport: http/streamable
    env_var_handling: env-headers-supported
    restart_behavior: session-restart
    editability: { global_rules: direct_write, project_rules: direct_write, mcp_config: direct_write }
    last_validated: unverified
    m8_enrollment: artifact_generated
    m8_notes: >-
      MCP config artifact generated (direct_write capable) but live validation unverified.
      CLAUDE.md present at all managed repo roots. Marked artifact_generated until operator
      confirms live session connects to agentcore-gateway and returns 401 auth.

  claude-desktop:
    installed_version: unverified
    rule_mechanism: 'app preferences / project instructions (no rules file)'
    mcp_schema: claude_desktop_json
    mcp_transport: http/streamable
    env_var_handling: no-env-headers-vk-materialized-live-only
    restart_behavior: full-app-restart
    editability: { global_rules: manual_import, project_rules: unsupported, mcp_config: direct_write }
    last_validated: unverified
    m8_enrollment: artifact_generated
    m8_notes: >-
      MCP config delivered via direct_write to claude_desktop_json artifact. Global rules
      require manual import via app preferences UI. Project-level rules unsupported by product.
      Env var secrets must be materialized (vk-live-only); no env-headers. Full app restart required.
      Enrollment artifact generated; operator must restart Claude Desktop to activate.

