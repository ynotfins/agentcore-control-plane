# IDE Capability Matrix — managed clients and rule/MCP delivery capabilities
# Source facts: ide-profiles/<ide>/IDE_PROFILE.yaml (this file is the cross-IDE summary).
# Editability modes: direct_write | generated_prompt | manual_import | unsupported | unverified
# Do not guess values — 'unverified' until evidence exists.

matrix_revision: "2026-07-16"
policy_source: contracts/global-agent-policy.yaml

enrollment_status_codes:
  fully_live_validated: "MCP verified, tools confirmed, identity isolated, rolling context proven"
  configured_restart_required: "Config complete, needs IDE restart to activate"
  artifact_generated: "Installation artifact produced; operator import required"
  unsupported: "Product does not support required MCP baseline"

managed_ides:
  cursor:
    installed_version: unverified
    rule_mechanism: 'native project rules (.cursor/rules, AGENTS.md) + app-settings User Rules'
    mcp_schema: cursor_mcp_json
    mcp_transport: http/streamable
    env_var_handling: env-headers-supported
    restart_behavior: mcp-reload-or-restart
    editability: { global_rules: manual_import, project_rules: direct_write, mcp_config: direct_write }
    last_validated: '2026-07-13'
    m8_enrollment: configured_restart_required
    m8_notes: >-
      MCP config delivered via direct_write (agentcore-gateway in C:\Users\ynotf\.cursor\mcp.json).
      Global rules require manual import into Cursor app settings. Profile validated 2026-07-13;
      IDE restart required to activate any MCP changes. Identity isolated by project-scoped capability profiles.

  codex:
    installed_version: unverified
    rule_mechanism: 'global + per-repo AGENTS.md'
    mcp_schema: codex_toml
    mcp_transport: http/streamable
    env_var_handling: bearer_token_env_var
    restart_behavior: session-restart
    editability: { global_rules: direct_write, project_rules: direct_write, mcp_config: direct_write }
    last_validated: '2026-07-14'
    m8_enrollment: configured_restart_required
    m8_notes: >-
      All config paths support direct_write; agentcore-gateway entry confirmed present.
      AGENTS.md and CLAUDE.md delivered to all managed repos. Profile validated 2026-07-14.
      New session required to activate gateway changes.

  claude-code:
